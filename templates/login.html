{% extends "base.html" %}

{% block title %}Giriş Yap — Big Bang Basketball{% endblock %}

{% block content %}
  <section class="section section-tint">
    <div class="section-heading">
      <h2>Giriş Yap</h2>
      <p>E-posta ve şifrenle hesabına gir.</p>
    </div>

    <form class="form-card" method="POST" action="{{ url_for('login') }}" novalidate>

      {% if error %}
        <div class="form-error">{{ error }}</div>
      {% endif %}

      <input type="hidden" name="next_url" value="{{ next_url }}">

      <div class="form-group">
        <label for="email">E-posta adresi</label>
        <input type="email" id="email" name="email" required
               value="{{ email if email else '' }}">
      </div>

      <div class="form-group">
        <label for="password">Şifre</label>
        <input type="password" id="password" name="password" required>
      </div>

      <button type="submit" class="btn btn-primary form-submit">Giriş Yap</button>

      <p class="form-switch-link">
        Hesabın yok mu?
        <a href="{{ url_for('register') }}">Kayıt Ol</a>
      </p>
    </form>
  </section>
{% endblock %}
